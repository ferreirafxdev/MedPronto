services:
  - type: web
    name: medpronto-backend
    rootDir: backend
    env: node
    plan: free
    buildCommand: npm install && npx tsc
    startCommand: node dist/index.js
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: SUPABASE_URL
        value: ${SUPABASE_URL}
      - key: SUPABASE_KEY
        value: ${SUPABASE_KEY}
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        value: https://medpronto-online.vercel.app
      - key: S3_ENDPOINT
        value: ${S3_ENDPOINT}
      - key: S3_REGION
        value: us-east-2
      - key: S3_ACCESS_KEY
        value: ${S3_ACCESS_KEY}
      - key: S3_SECRET_KEY
        value: ${S3_SECRET_KEY}
      - key: S3_BUCKET
        value: s3