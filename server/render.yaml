services:
  - type: web
    name: medpronto-backend
    env: node
    plan: free
    buildDir: .
    buildCommand: npm install && npx tsc
    startCommand: node dist/index.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
